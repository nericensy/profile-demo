<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Profile Result</title>

<!-- 🔥 FACEBOOK PREVIEW (VERY IMPORTANT) -->
<meta property="og:title" content="Daily Athlete 💪">
<meta property="og:description" content="I just completed this survey! Check out my result.">
<meta property="og:image" content="https://nericensy.github.io/profile-demo/profile.html">
<meta property="og:url" content="https://nericensy.github.io/profile-demo/profile.html">

<!-- Basic Styling -->
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f2f6fb;
        margin: 0;
        padding: 0;
    }

    .container {
        width: 80%;
        margin: 80px auto;
    }

    .card {
        display: flex;
        align-items: center;
        background: #dceaf5;
        border-radius: 25px;
        padding: 25px;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }

    .card:hover {
        transform: scale(1.02);
        background: #cfe3f2;
    }

    .card img {
        width: 140px;
        margin-right: 25px;
    }

    .text h2 {
        margin: 0;
        color: #2c3e50;
    }

    .text p {
        margin-top: 10px;
        color: #555;
    }

    .hint {
        margin-top: 20px;
        font-size: 14px;
        color: #888;
    }
</style>
</head>

<body>

<div class="container">

    <div class="card" onclick="shareToFacebook()">
        <img src="assets/img/profile.png" alt="Profile">
        <div class="text">
            <h2>DAILY ATHLETE 💪</h2>
            <p>Your active routine increases your hydration demands.</p>
        </div>
    </div>

    <div class="hint">
        Click the card to share your result on Facebook
    </div>

</div>

<script>
function shareToFacebook() {

    let url = "https://nericensy.github.io/profile-demo/profile.html";
    let quote = "I just completed this survey! 💪 Check out my result!";

    let fbUrl = "https://www.facebook.com/sharer/sharer.php?u=" 
        + encodeURIComponent(url) 
        + "&quote=" 
        + encodeURIComponent(quote);

    window.open(fbUrl, "_blank");
}
</script>

</body>
</html>
